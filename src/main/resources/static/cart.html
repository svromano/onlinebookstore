<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart - Online Bookstore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        nav {
            background: #2c3e50;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        nav ul li a:hover {
            background: #34495e;
        }

        nav ul li a.active {
            background: #4CAF50;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin: 30px 0;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }
        table input[type="number"] {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .remove-btn {
            padding: 8px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .remove-btn:hover {
            background: #c0392b;
        }
        .total {
            text-align: right;
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .checkout-btn {
            text-align: center;
            margin: 40px 0;
        }
        .checkout-btn button {
            padding: 15px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .checkout-btn button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Online Bookstore</div>
    <ul>
        <li><a href="/catalog.html">Home</a></li>
        <li><a href="/cart.html" class="active">Cart</a></li>
        <li><a href="/orders.html">Orders</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Your Shopping Cart</h1>

    <table id="cartTable">
        <thead>
        <tr>
            <th>Title</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Subtotal</th>
            <th>Remove</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total" id="cartTotal"></div>

    <div class="checkout-btn">
        <button onclick="checkout()">Proceed to Checkout</button>
    </div>
</div>

<script>
    // Logout functionality
    document.getElementById('logoutLink').addEventListener('click', (e) => {
        e.preventDefault();
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('cart');
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }
    });

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const tbody = document.querySelector('#cartTable tbody');
    const totalEl = document.getElementById('cartTotal');

    function renderCart() {
        tbody.innerHTML = '';
        let total = 0;

        if (!cart.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="padding: 40px; color: #777;">Your cart is empty.</td></tr>';
            totalEl.textContent = '';
            return;
        }

        cart.forEach((item, index) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${item.title}</strong></td>
                <td>$${item.price.toFixed(2)}</td>
                <td><input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${index}, this.value)"></td>
                <td>$${subtotal.toFixed(2)}</td>
                <td><button class="remove-btn" onclick="removeItem(${index})">Remove</button></td>
            `;
            tbody.appendChild(row);
        });

        totalEl.textContent = `Total Amount: $${total.toFixed(2)}`;
    }

    function updateQuantity(index, value) {
        cart[index].quantity = parseInt(value);
        saveCart();
        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        saveCart();
        renderCart();
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    async function checkout() {
        if (!cart.length) {
            alert('Cart is empty!');
            return;
        }

        const userId = Number(localStorage.getItem('userId') || 1);
        const username = localStorage.getItem('username') || 'guest';

        const items = cart.map(i => ({
            bookId: i.id,
            title: i.title,
            price: i.price,
            quantity: i.quantity
        }));

        try {
            const response = await fetch(`/api/cart/checkout?userId=${userId}&username=${encodeURIComponent(username)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(items)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || 'Checkout failed');
            }

            alert('Order placed successfully!');
            localStorage.removeItem('cart');
            window.location.href = '/orders.html';
        } catch (err) {
            console.error('Checkout error:', err);
            alert('Error during checkout: ' + err.message);
        }
    }

    renderCart();
</script>

</body>
</html>
