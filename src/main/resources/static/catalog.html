<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: #2c3e50;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        nav ul li a:hover {
            background: #34495e;
        }

        nav ul li a.active {
            background: #4CAF50;
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
        }

        /* FILTERS */
        .filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            padding: 12px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ddd;
            min-width: 250px;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        /* CATALOG GRID */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* BOOK CARD */
        .book-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .book-card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .book-card h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .book-author {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        .book-category {
            font-size: 12px;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .book-description {
            font-size: 13px;
            color: #777;
            line-height: 1.4;
            margin-bottom: 10px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-price {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .book-card button {
            padding: 12px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .book-card button:hover {
            background: #45a049;
        }

        /* PAGINATION */
        .pagination {
            text-align: center;
            margin: 30px 0;
        }

        .pagination button {
            padding: 8px 15px;
            margin: 0 5px;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">Online Bookstore</div>
    <ul>
        <li><a href="/catalog.html" class="active">Home</a></li>
        <li><a href="/cart.html">Cart</a></li>
        <li><a href="/orders.html">Orders</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
    </ul>
</nav>

<div class="container">

    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Search by title or author">
        <select id="categorySelect">
            <option value="">All Categories</option>
        </select>
    </div>

    <div class="catalog" id="catalog"></div>

    <div class="pagination">
        <button id="prevBtn">⬅ Previous</button>
        <span id="pageInfo"></span>
        <button id="nextBtn">Next ➡</button>
    </div>

</div>

<script>
    // Logout functionality
    document.getElementById('logoutLink').addEventListener('click', (e) => {
        e.preventDefault();
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('cart');
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }
    });
    const catalogEl = document.getElementById("catalog");
    const searchInput = document.getElementById("searchInput");
    const categorySelect = document.getElementById("categorySelect");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentPage = 0;
    const pageSize = 4;
    let totalPages = 0;

    async function fetchCategories() {
        const res = await fetch("/api/categories");
        const categories = await res.json();

        categorySelect.innerHTML = '<option value="">All Categories</option>';

        categories.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.name;
            categorySelect.appendChild(opt);
        });
    }

    async function fetchBooks(page = 0) {
        let url = `/api/books?page=${page}&size=${pageSize}`;

        if (searchInput.value)
            url += `&query=${encodeURIComponent(searchInput.value)}`;

        if (categorySelect.value)
            url += `&categoryId=${categorySelect.value}`;

        const res = await fetch(url);
        const data = await res.json();

        renderBooks(data.content);

        currentPage = data.number;
        totalPages = data.totalPages;

        pageInfo.textContent = `Page ${currentPage + 1} of ${totalPages}`;
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === totalPages - 1;
    }

    function renderBooks(books) {
        catalogEl.innerHTML = "";

        if (!books.length) {
            catalogEl.innerHTML = "<p>No books found.</p>";
            return;
        }

        books.forEach(book => {
            const card = document.createElement("div");
            card.className = "book-card";

            card.innerHTML = `
                <img src="${book.imageUrl || 'https://via.placeholder.com/250x300'}">
                <div class="book-card-content">
                    <h3>${book.title}</h3>
                    <div class="book-author">${book.author}</div>
                    <div class="book-category">${book.category?.name || "Uncategorized"}</div>
                    <div class="book-description">${book.description || "No description available."}</div>
                    <div class="book-price">$${book.price.toFixed(2)}</div>
                    <button>Add to Cart</button>
                </div>
            `;

            card.querySelector("button").onclick = () => addToCart(book);
            catalogEl.appendChild(card);
        });
    }

    function addToCart(book) {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const existing = cart.find(b => b.id === book.id);

        if (existing) existing.quantity++;
        else cart.push({ ...book, quantity: 1 });

        localStorage.setItem("cart", JSON.stringify(cart));
        alert("Added to cart");
    }

    prevBtn.onclick = () => fetchBooks(currentPage - 1);
    nextBtn.onclick = () => fetchBooks(currentPage + 1);
    searchInput.oninput = () => fetchBooks(0);
    categorySelect.onchange = () => fetchBooks(0);

    fetchCategories();
    fetchBooks();
</script>

</body>
</html>
