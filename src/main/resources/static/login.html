<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Bookstore</title>
    <style>
        /* Base styles */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; margin-bottom: 25px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #4CAF50; outline: none; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background: #45a049; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .link a { color: #4CAF50; text-decoration: none; font-weight: bold; }
        .link a:hover { text-decoration: underline; }

        /* Error Message Styling */
        .error-alert {
            display: none; /* Hidden by default */
            background-color: #fdecea;
            color: #d32f2f;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #f5c6cb;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Login</h2>

    <div id="error-message" class="error-alert">
        Incorrect username or password.
    </div>

    <form action="/api/auth/login" method="post">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
    /**
     * Logic: Spring Security redirects failed logins to "/login?error".
     * This script checks the URL for that 'error' parameter.
     */
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
        document.getElementById('error-message').style.display = 'block';
    }
</script>

</body>
</html>
