<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Bookstore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #1e293b;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* --- Header / Glassmorphism --- */
        header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 24px 32px;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        header h1 {
            font-weight: 700;
            letter-spacing: -0.025em;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            background: white;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #fee2e2;
            transform: translateY(-1px);
        }

        /* --- Dashboard Grid --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
            color: #334155;
        }

        /* --- Forms --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* --- Alerts --- */
        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }

        .back-link {
            display: inline-flex;
            align-items: center;
            margin-top: 32px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .container { margin: 20px auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><span style="background: #e0e7ff; padding: 8px; border-radius: 10px;">🛡️</span> Admin Panel</h1>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h2>👤 Identity Management</h2>
            <div id="userAlert" class="alert"></div>
            <form id="registerUserForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="newUsername" required placeholder="johndoe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="newEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="newPassword" required minlength="6" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Access Level</label>
                    <select id="userRole">
                        <option value="USER">Standard User</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>

        <div class="card">
            <h2>📚 Inventory Management</h2>
            <div id="bookAlert" class="alert"></div>
            <form id="addBookForm">
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" id="bookTitle" required placeholder="The Great Gatsby">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" id="bookAuthor" required placeholder="F. Scott Fitzgerald">
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="bookPrice" required step="0.01" placeholder="19.99">
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="bookCategory" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="bookDescription" placeholder="Brief summary of the book..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Add to Catalog</button>
            </form>
        </div>
    </div>

    <a href="/catalog.html" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Return to Catalog
    </a>
</div>

</body>
</html>
