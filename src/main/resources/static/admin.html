<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Online Bookstore</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- Refined Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 24px 32px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        /* --- Buttons --- */
        .logout-btn {
            background: #fff;
            color: var(--danger);
            border: 1px solid #fee2e2;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #fef2f2;
            border-color: var(--danger);
            transform: translateY(-1px);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* --- Grid Layout --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background-color: #fcfdfe;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* --- Alerts --- */
        .alert {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
        }

        .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert.show { display: block; }

        .back-link {
            display: inline-flex;
            align-items: center;
            margin-top: 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛡️ Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h2>👤 Identity Management</h2>
            <div id="userAlert" class="alert"></div>

            <form id="registerUserForm">
                <div class="form-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" name="username" required placeholder="e.g. admin_jdoe">
                </div>
                <div class="form-group">
                    <label for="newEmail">Email</label>
                    <input type="email" id="newEmail" name="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" name="password" required placeholder="••••••••" minlength="6">
                </div>
                <div class="form-group">
                    <label for="userRole">Role</label>
                    <select id="userRole" name="role" required>
                        <option value="USER">Standard User</option>
                        <option value="ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Register User</button>
            </form>
        </div>

        <div class="card">
            <h2>📚 Inventory Management</h2>
            <div id="bookAlert" class="alert"></div>

            <form id="addBookForm">
                <div class="form-group">
                    <label for="bookTitle">Title</label>
                    <input type="text" id="bookTitle" name="title" required placeholder="Enter book title">
                </div>
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="bookAuthor">Author</label>
                        <input type="text" id="bookAuthor" name="author" required placeholder="Author name">
                    </div>
                    <div class="form-group">
                        <label for="bookPrice">Price ($)</label>
                        <input type="number" id="bookPrice" name="price" required step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>
                <div class="form-group">
                    <label for="bookCategory">Category</label>
                    <select id="bookCategory" name="categoryId" required>
                        <option value="">-- Select Category --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bookDescription">Description</label>
                    <textarea id="bookDescription" name="description" placeholder="Enter summary..."></textarea>
                </div>
                <div class="form-group">
                    <label for="bookImageUrl">Image URL</label>
                    <input type="url" id="bookImageUrl" name="imageUrl" placeholder="https://example.com/cover.jpg">
                </div>
                <button type="submit" class="submit-btn">Add Book</button>
            </form>
        </div>
    </div>

    <a href="/catalog.html" class="back-link">← Return to Catalog</a>
</div>

<script>
    /* LOGIC REMAINS COMPLETELY UNCHANGED */
    document.addEventListener('DOMContentLoaded', () => { loadCategories(); });

    async function loadCategories() {
        try {
            const response = await fetch('/api/categories');
            if (!response.ok) throw new Error('Failed to load categories');
            const categories = await response.json();
            const categorySelect = document.getElementById('bookCategory');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.name;
                categorySelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error:', error);
            showAlert('bookAlert', 'Failed to load categories', 'error');
        }
    }

    document.getElementById('registerUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registering...';

        const formData = {
            username: document.getElementById('newUsername').value,
            email: document.getElementById('newEmail').value,
            password: document.getElementById('newPassword').value,
            role: document.getElementById('userRole').value
        };

        try {
            const response = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                showAlert('userAlert', 'User registered successfully!', 'success');
                e.target.reset();
            } else {
                const errorText = await response.text();
                showAlert('userAlert', errorText || 'Failed to register user', 'error');
            }
        } catch (error) {
            showAlert('userAlert', 'An error occurred', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Register User';
        }
    });

    document.getElementById('addBookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Adding Book...';

        const formData = {
            title: document.getElementById('bookTitle').value,
            author: document.getElementById('bookAuthor').value,
            price: parseFloat(document.getElementById('bookPrice').value),
            categoryId: parseInt(document.getElementById('bookCategory').value),
            description: document.getElementById('bookDescription').value,
            imageUrl: document.getElementById('bookImageUrl').value
        };

        try {
            const response = await fetch('/api/admin/books', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                showAlert('bookAlert', 'Book added successfully!', 'success');
                e.target.reset();
            } else {
                const errorText = await response.text();
                showAlert('bookAlert', errorText || 'Failed to add book', 'error');
            }
        } catch (error) {
            showAlert('bookAlert', 'An error occurred', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Add Book';
        }
    });

    function showAlert(elementId, message, type) {
        const alertElement = document.getElementById(elementId);
        alertElement.textContent = message;
        alertElement.className = `alert ${type} show`;
        setTimeout(() => { alertElement.classList.remove('show'); }, 5000);
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            window.location.href = '/api/auth/logout';
        }
    }
</script>
</body>
</html>
